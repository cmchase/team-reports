# GitLab Configuration Example
# Copy to gitlab_config.yaml and customize. Use for self-hosted (e.g. VPN) or GitLab.com.

# Base URL for GitLab API (use for self-hosted instances)
# Default: https://gitlab.com - for self-hosted use your instance URL (e.g. https://gitlab.example.com)
base_url: "https://gitlab.example.com"

# List of projects to analyze (path with namespace, e.g. group/subgroup/project)
projects:
  - "my-group/my-project"
# Example for multiple projects:
# projects:
#   - "my-group/repo-one"
#   - "my-group/subgroup/repo-two"

# Report settings
report_settings:
  max_results: 100
  include_private: true
  track_merge_requests: true
  track_commits: true
  track_issues: true
  timezone: "UTC"
  max_contributors_in_overview: 15
  max_recent_items_per_contributor: 10

# API settings
api_settings:
  rate_limit_buffer: 100
  timeout: 30
  max_retries: 3
  retry_delay: 1

# Contributor filters (reuse same bot patterns as in default_config if desired)
contributor_filters:
  exclude_bots: true
